<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSP</title>
  <link href="./src/css/style.css" rel="stylesheet">
  <script defer src="./src/js/burger.js"></script>
  <script defer src="./src/js/main.js"></script>
</head>

<body>
  <header class="header">
    <div class="wrapper header__container">
      <a href="/" class="header__logo" aria-label="На главную">
        <img src="./media/icons/logo/logo-black.svg" alt="logotype" width="217" height="40">
      </a>

      <button class="header__burger" type="button" aria-expanded="false" aria-label="Открыть меню">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="header__menu" aria-label="Основная навигация">
        <a href="#" class="header__menu-link">Программа</a>
        <a href="#" class="header__menu-button button__prymary">Зарегистрироваться</a>
      </nav>
    </div>
  </header>

  <div class="wrapper">
    <section class="hero hero__container">
      <div class="hero__circles" aria-hidden="true"></div>
      <div class="hero__left">
        <div class="hero__text">
          <h1 class="hero__title">
            Бизнес и цифровая трансформация: <span class="hero__title-color">новые горизонты</span>
          </h1>
          <div class="hero__data">16 апреля 2026
            <p class="hero__data-text">Москва, Раменский бульвар, 1,
              кластер Ломоносов</p>
          </div>
        </div>
        <div class="hero__button">
          <a class="hero__button-link button__prymary" href="#">Зарегистрироваться</a>
          <a class="hero__button-link button__prymary" href="#">Добавить в календарь</a>
        </div>
      </div>
    </section>
  </div>
</body>

</html>
